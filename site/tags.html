<script>
(async function () {
  const { t, el, fetchJSON, renderHeader, renderFooter, renderTagBrowser, lang } = window.CO;
  const root = document.getElementById("root");
  document.documentElement.lang = lang;
  root.append(renderHeader("tags"));

  let rulings;
  try {
    rulings = await fetchJSON("_data/rulings.json");
  } catch (e) {
    root.append(el("main", {}, el("p", {}, `Error: ${e.message}`)));
    root.append(renderFooter());
    return;
  }

  root.append(renderTagBrowser(rulings));
  root.append(renderFooter());
})();
