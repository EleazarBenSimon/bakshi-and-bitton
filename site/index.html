<script type="application/ld+json">{"@context": "https://schema.org", "@type": "Dataset", "name": "Bakshi&Bitton · בקשי&ביטון", "description": "מאגר תיעודי מובנה של פסיקות בית המשפט העליון בישראל בעניין החלטות ממשלה ומינויים — מקושר למקור הרשמי. A structured documentary database of Israeli Supreme Court rulings on elected-branch decisions and appointments.", "url": "https://eleazarbensimon.github.io/bakshi-and-bitton/", "inLanguage": ["he", "en"], "license": "https://opensource.org/licenses/MIT", "creator": {"@type": "Person", "name": "Eleazar Ben Simon"}, "distribution": [{"@type": "DataDownload", "encodingFormat": "application/json", "contentUrl": "https://eleazarbensimon.github.io/bakshi-and-bitton/_data/rulings.json"}, {"@type": "DataDownload", "encodingFormat": "text/csv", "contentUrl": "https://eleazarbensimon.github.io/bakshi-and-bitton/_data/rulings.csv"}]}</script><link rel="stylesheet" href="assets/style.css?v=d6234150">
<link rel="alternate" type="application/rss+xml" title="Bakshi&Bitton — new rulings" href="feed.xml">
</head>
<body>
<img src="https://visitor-badge.laobi.icu/badge?page_id=eleazarbensimon.bakshi-home" alt="" aria-hidden="true" width="1" height="1" style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0);opacity:0;pointer-events:none" />
<div id="root"></div>
<script src="assets/app.js?v=ba4f2576"></script>
<script>
(async function () {
  const { t, el, fetchJSON, ruling_name, renderHeader, renderFooter, renderCurveSection, lang,
          outcome_label, doctrine_label, doctrines_label,
          petitioner_type_label, compliance_label, SEVERITY_BY_OUTCOME, decorateMQG } = window.CO;
  const root = document.getElementById("root");
  document.documentElement.lang = lang;
  root.append(renderHeader("rulings"));

  const main = el("main", { class: "home" });

  // ── Compact hero ───────────────────────────────────────────────────
  const hero = el("div", { class: "home-hero" });
  hero.append(el("h1", {}, t.site_title));
  hero.append(el("p", { class: "home-tagline" }, t.site_subtitle));
  main.append(hero);

  let rulings = [];
  try {
    rulings = await fetchJSON("_data/rulings.json");
  } catch (e) {
    main.append(el("p", {}, `Error: ${e.message}`));
    root.append(main);
    return;
  }

  // The 22 rulings are deep case files; the corpus is far larger. Pull the
  // FULL footprint (rulings + Quiet-Veto library) so the hero tells the true
  // scale instead of undercounting it as "22 rulings".
  let corpus = null;
  try { corpus = await fetchJSON("_data/corpus_stats.json"); } catch (e) { corpus = null; }
  // Secondary event dots for the curve (Quiet-Veto / reading-down library).
  let curveEvents = [];
  try { curveEvents = await fetchJSON("_data/curve_events.json"); } catch (e) { curveEvents = []; }

  // ── The curve — signature visual, the first major thing encountered ─
  main.append(renderCurveSection(rulings, curveEvents));

  // ── Stat band (animated count-up) ──────────────────────────────────
  const struckSet = new Set(["struck_down", "partially_struck"]);
  const yrs = rulings.map(r => +(r.ruling_date || "").slice(0, 4)).filter(Boolean);
  const minY = Math.min(...yrs), maxY = Math.max(...yrs);
  const stats = corpus ? [
    { n: corpus.total_cases, label: t.stat_documented, key: "" },
    { n: corpus.neutralized_total, label: t.stat_neutralized, key: "struck" },
    { isText: true, pre: `${corpus.year_min}–${corpus.year_max}`, label: t.stat_years },
    { n: corpus.library_hollowed, label: t.stat_hollowed, key: "" },
  ] : [
    { n: rulings.length, label: t.stat_rulings, key: "" },
    { n: rulings.filter(r => struckSet.has(r.outcome)).length, label: t.stat_struck, key: "struck" },
    { n: (maxY - minY), label: t.stat_years, suffix: "", pre: `${minY}–${maxY}`, isText: true },
    { n: rulings.filter(r => (r.panel || []).length >= 9).length, label: t.stat_enbanc, key: "" },
  ];
  const statBand = el("div", { class: "stat-band" });
  for (const s of stats) {
    const numEl = el("div", { class: "stat-num" }, s.isText ? s.pre : "0");
    const tile = el("div", { class: "stat-tile" + (s.key === "struck" ? " stat-tile--accent" : "") },
      numEl,
      el("div", { class: "stat-label" }, s.label));
    statBand.append(tile);
    if (!s.isText) countUp(numEl, s.n);
  }
  main.append(statBand);

  // ── Scale note — the 22-row table is only the core; point to the rest ──
  if (corpus) {
    const note = el("p", { class: "home-scale-note" });
    note.append(document.createTextNode(t.scale_note_a(corpus.rulings_total) + " "));
    note.append(el("a", { href: "reading-quiet-veto.html" }, t.scale_note_link(corpus.total_cases)));
    note.append(document.createTextNode(" " + t.scale_note_b));
    main.append(note);
  }

  // ── Methodology note (compact, secondary) ──────────────────────────
  main.append(el("p", { class: "home-method" }, t.methodology_notice));

  // ── Filter / search bar (sticky) ───────────────────────────────────
  const outcomes = [...new Set(rulings.map(r => r.outcome))].sort().map(o => ({ value: o, label: outcome_label(o) }));
  const doctrines = [...new Set(rulings.flatMap(r => r.doctrine_invoked || []))].sort().map(d => ({ value: d, label: doctrine_label(d) }));
  const years = [...new Set(rulings.map(r => (r.ruling_date || "").slice(0, 4)).filter(Boolean))].sort().reverse();
  const petitionerTypes = [...new Set(rulings.map(r => r.petitioner_type).filter(Boolean))].sort()
    .map(p => ({ value: p, label: petitioner_type_label(p) }));
  const complianceStates = [...new Set(rulings.map(r => r.compliance_state).filter(Boolean))].sort()
    .map(c => ({ value: c, label: compliance_label(c) }));

  function makeSelect(key, allLabel, options) {
    return el("select", { id: `filter-${key}`, class: "fbar-select", "aria-label": allLabel },
      el("option", { value: "" }, allLabel),
      ...options.map(o => el("option", { value: o.value }, o.label)));
  }

  const searchInput = el("input", {
    type: "search", id: "filter-search", class: "fbar-search",
    placeholder: t.search_placeholder, "aria-label": t.filter_search_label,
  });
  const searchWrap = el("div", { class: "fbar-search-wrap" },
    svgIcon("M11 4a7 7 0 1 0 4.95 11.95l4.55 4.55-1.4 1.4-4.55-4.55A7 7 0 0 0 11 4z", "fbar-search-icon"),
    searchInput);

  const selOutcome = makeSelect("outcome", t.filter_outcome, outcomes);
  const selDoctrine = makeSelect("doctrine", t.filter_doctrine, doctrines);
  const selYear = makeSelect("year", t.filter_year, years);
  const selPetitioner = makeSelect("petitioner", t.filter_petitioner, petitionerTypes);
  const selCompliance = makeSelect("compliance", t.filter_compliance, complianceStates);

  const clearBtn = el("button", { class: "fbar-clear", type: "button" }, t.filter_clear);
  const countSpan = el("span", { class: "fbar-count", id: "count" });
  const eraChip = el("button", { class: "fbar-era-chip", type: "button", style: "display:none" });

  const fbar = el("div", { class: "fbar" },
    searchWrap, selOutcome, selDoctrine, selYear, selPetitioner, selCompliance, eraChip,
    el("span", { class: "fbar-spacer" }),
    countSpan, clearBtn);
  main.append(fbar);

  // ── Table ──────────────────────────────────────────────────────────
  const sort = { col: "date", dir: -1 };  // newest first
  let eraFilter = null;  // {start,end,label} when an era band on the curve is clicked
  const cols = [
    { key: "date",      label: t.col_date,       sortable: true,  cls: "" },
    { key: "case",      label: t.col_case,       sortable: false, cls: "" },
    { key: "outcome",   label: t.col_outcome,    sortable: true,  cls: "" },
    { key: "vote",      label: t.col_vote,       sortable: true,  cls: "col-num" },
    { key: "doctrine",  label: t.col_doctrine,   sortable: false, cls: "col-soft" },
    { key: "petitioner",label: t.col_petitioner, sortable: false, cls: "col-soft" },
  ];
  const headRow = el("tr", {});
  for (const c of cols) {
    const th = el("th", { class: c.cls + (c.sortable ? " th-sortable" : "") });
    if (c.sortable) {
      const arrow = el("span", { class: "th-arrow" }, "");
      th.append(el("button", { class: "th-btn", type: "button", "aria-label": t.sort_aria,
        onClick: () => toggleSort(c.key) }, c.label, arrow));
      th.dataset.col = c.key;
    } else {
      th.append(c.label);
    }
    headRow.append(th);
  }
  const tbody = el("tbody", { id: "rulings-tbody" });
  const tableInner = el("table", { class: "rulings-table" }, el("thead", {}, headRow), tbody);
  main.append(el("div", { class: "table-scroll" }, tableInner));

  // ── Filtering + sorting + render ───────────────────────────────────
  const sortVal = {
    date: r => r.ruling_date || "",
    outcome: r => SEVERITY_BY_OUTCOME[r.outcome] ?? 0,  // sort by intervention severity (power-grab index), not alphabetically
    vote: r => (r.vote_majority != null ? r.vote_majority * 100 - (r.vote_minority || 0) : -1),
  };

  function currentFilters() {
    return {
      outcome: selOutcome.value, doctrine: selDoctrine.value, year: selYear.value,
      petitioner: selPetitioner.value, compliance: selCompliance.value,
      search: (searchInput.value || "").trim().toLowerCase(),
    };
  }

  function render() {
    const f = currentFilters();
    let list = rulings.filter(r => {
      if (f.outcome && r.outcome !== f.outcome) return false;
      if (f.doctrine && !(r.doctrine_invoked || []).includes(f.doctrine)) return false;
      if (f.year && !(r.ruling_date || "").startsWith(f.year)) return false;
      if (f.petitioner && r.petitioner_type !== f.petitioner) return false;
      if (f.compliance && r.compliance_state !== f.compliance) return false;
      if (eraFilter) { const ey = +(r.ruling_date || "").slice(0, 4); if (!(ey >= eraFilter.start && ey <= eraFilter.end)) return false; }
      if (f.search) {
        const hay = [r.case_id, r.case_name_he, r.case_name_en, r.summary_he, r.summary_en,
          r.petitioner_name_he, r.petitioner_name_en].join(" ").toLowerCase();
        if (!hay.includes(f.search)) return false;
      }
      return true;
    });
    const get = sortVal[sort.col] || sortVal.date;
    list.sort((a, b) => {
      const va = get(a), vb = get(b);
      if (va < vb) return -1 * sort.dir;
      if (va > vb) return 1 * sort.dir;
      return 0;
    });

    countSpan.textContent = t.rulings_count(list.length);
    const anyFilter = f.outcome || f.doctrine || f.year || f.petitioner || f.compliance || f.search || eraFilter;
    clearBtn.classList.toggle("show", !!anyFilter);

    // update sort arrows
    headRow.querySelectorAll("th[data-col]").forEach(th => {
      const a = th.querySelector(".th-arrow");
      a.textContent = th.dataset.col === sort.col ? (sort.dir === 1 ? " ▲" : " ▼") : "";
      th.classList.toggle("th-active", th.dataset.col === sort.col);
    });

    tbody.replaceChildren();
    if (!list.length) {
      tbody.append(el("tr", {}, el("td", { colspan: "6", class: "tbl-empty" }, t.no_rulings)));
      return;
    }
    for (const r of list) {
      const vote = r.vote_majority != null ? `${r.vote_majority}–${r.vote_minority ?? 0}` : "—";
      const href = `ruling-${r.case_id_slug}.html`;
      const tr = el("tr", { class: "rrow", tabindex: "0" },
        el("td", { class: "col-date" }, r.ruling_date),
        el("td", {},
          el("a", { href, class: "rrow-case" }, r.case_id),
          el("div", { class: "rrow-name" }, ruling_name(r))),
        el("td", {}, el("span", { class: `outcome-pill outcome-${r.outcome}` }, outcome_label(r.outcome))),
        el("td", { class: "col-num vote" }, vote),
        el("td", { class: "col-soft" }, doctrines_label(r.doctrine_invoked)),
        el("td", { class: "col-soft" }, lang === "he" ? (r.petitioner_name_he || "") : (r.petitioner_name_en || "")),
      );
      tr.addEventListener("click", (e) => { if (!e.target.closest("a")) location.href = href; });
      tr.addEventListener("keydown", (e) => { if (e.key === "Enter") location.href = href; });
      tbody.append(tr);
    }
    decorateMQG(tbody);
  }

  function toggleSort(col) {
    if (sort.col === col) sort.dir *= -1;
    else { sort.col = col; sort.dir = col === "date" ? -1 : 1; }
    render();
  }

  function setEra(era) {
    eraFilter = era;
    if (era) {
      eraChip.textContent = (lang === "he" ? "תקופה: " : "Era: ") + era.label + "  ✕";
      eraChip.style.display = "";
    } else {
      eraChip.style.display = "none";
    }
  }

  const resetEra = () => document.dispatchEvent(new CustomEvent("co-era-focus", { detail: { idx: -1 } }));

  function clearAll() {
    selOutcome.value = ""; selDoctrine.value = ""; selYear.value = "";
    selPetitioner.value = ""; selCompliance.value = ""; searchInput.value = "";
    resetEra();  // resets the curve zoom + clears the era filter via the unified control
    render(); searchInput.focus();
  }
  clearBtn.addEventListener("click", clearAll);
  eraChip.addEventListener("click", resetEra);

  // Unified era control (in renderCurveSection) emits co-era-filter whenever an
  // era is focused/cleared — here we just sync the table. The curve re-fits
  // itself, so no scroll-jump: the focus is felt in place.
  document.addEventListener("co-era-filter", (e) => {
    setEra(e.detail);
    render();
  });

  let searchTimer;
  searchInput.addEventListener("input", () => { clearTimeout(searchTimer); searchTimer = setTimeout(render, 120); });
  selOutcome.addEventListener("change", render);
  selDoctrine.addEventListener("change", render);
  selYear.addEventListener("change", render);
  selPetitioner.addEventListener("change", render);
  selCompliance.addEventListener("change", render);

  root.append(main);
  root.append(renderFooter());
  render();

  // ── helpers ────────────────────────────────────────────────────────
  function svgIcon(d, cls) {
    const ns = "http://www.w3.org/2000/svg";
    const s = document.createElementNS(ns, "svg");
    s.setAttribute("viewBox", "0 0 24 24"); s.setAttribute("class", cls); s.setAttribute("aria-hidden", "true");
    s.innerHTML = `<path d="${d}" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>`;
    return s;
  }
  function countUp(node, target) {
    if (window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches) { node.textContent = target; return; }
    const dur = 650, t0 = performance.now();
    function step(now) {
      const p = Math.min(1, (now - t0) / dur);
      const eased = 1 - Math.pow(1 - p, 3);
      node.textContent = Math.round(target * eased);
      if (p < 1) requestAnimationFrame(step);
    }
    requestAnimationFrame(step);
  }
})();
</script>
</body>
