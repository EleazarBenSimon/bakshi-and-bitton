<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bakshi&Bitton · בקשי וביטון</title>
<link rel="stylesheet" href="assets/style.css">
<link rel="alternate" type="application/rss+xml" title="Bakshi&Bitton — new rulings" href="feed.xml">
</head>
<body>
<div id="root"></div>
<script src="assets/app.js"></script>
<script>
(async function () {
  const { t, el, fetchJSON, ruling_name, renderHeader, renderFooter, renderCurveSection, lang } = window.CO;
  const root = document.getElementById("root");
  document.documentElement.lang = lang;

  root.append(renderHeader("rulings"));

  const main = el("main", {});

  main.append(el("h1", {}, t.site_title));
  main.append(el("div", { class: "notice" }, t.methodology_notice));

  let rulings = [];
  try {
    rulings = await fetchJSON("_data/rulings.json");
  } catch (e) {
    main.append(el("p", {}, `Error: ${e.message}`));
    root.append(main);
    return;
  }

  // Intervention-severity curve (hero visual)
  main.append(renderCurveSection(rulings));

  // Filters
  const filtersDiv = el("div", { class: "filters" });

  const outcomes = [...new Set(rulings.map((r) => r.outcome))].sort();
  const doctrines = [...new Set(rulings.flatMap((r) => r.doctrine_invoked || []))].sort();
  const years = [...new Set(rulings.map((r) => (r.ruling_date || "").slice(0, 4)).filter(Boolean))].sort().reverse();

  function makeSelect(label, key, options) {
    const sel = el("select", { id: `filter-${key}` },
      el("option", { value: "" }, t.filter_all),
      ...options.map((o) => el("option", { value: o }, o))
    );
    return el("label", {}, label, sel);
  }

  filtersDiv.append(makeSelect(t.filter_outcome, "outcome", outcomes));
  filtersDiv.append(makeSelect(t.filter_doctrine, "doctrine", doctrines));
  filtersDiv.append(makeSelect(t.filter_year, "year", years));
  filtersDiv.append(
    el("label", {}, " ",
      el("input", { type: "search", id: "filter-search", placeholder: t.search_placeholder, style: "min-width:220px" })
    )
  );

  main.append(filtersDiv);

  const countDiv = el("p", { id: "count", style: "color:var(--text-muted);font-size:14px" });
  main.append(countDiv);

  const tableInner = el("table", {},
    el("thead", {},
      el("tr", {},
        el("th", {}, t.col_date),
        el("th", {}, t.col_case),
        el("th", {}, t.col_outcome),
        el("th", { style: "white-space:nowrap" }, t.col_vote),
        el("th", {}, t.col_doctrine),
        el("th", {}, t.col_petitioner),
      )
    ),
    el("tbody", { id: "rulings-tbody" })
  );
  const table = el("div", { class: "table-scroll" }, tableInner);
  main.append(table);

  function render() {
    const fOutcome = document.getElementById("filter-outcome").value;
    const fDoctrine = document.getElementById("filter-doctrine").value;
    const fYear = document.getElementById("filter-year").value;
    const fSearch = (document.getElementById("filter-search").value || "").toLowerCase();

    const filtered = rulings.filter((r) => {
      if (fOutcome && r.outcome !== fOutcome) return false;
      if (fDoctrine && !(r.doctrine_invoked || []).includes(fDoctrine)) return false;
      if (fYear && !(r.ruling_date || "").startsWith(fYear)) return false;
      if (fSearch) {
        const hay = [r.case_id, r.case_name_he, r.case_name_en, r.summary_he, r.summary_en, r.petitioner_name_he, r.petitioner_name_en].join(" ").toLowerCase();
        if (!hay.includes(fSearch)) return false;
      }
      return true;
    });

    countDiv.textContent = t.rulings_count(filtered.length);
    const tbody = document.getElementById("rulings-tbody");
    tbody.replaceChildren();

    if (filtered.length === 0) {
      tbody.append(el("tr", {}, el("td", { colspan: "6" }, t.no_rulings)));
      return;
    }

    for (const r of filtered) {
      const vote = r.vote_majority != null
        ? `${r.vote_majority}–${r.vote_minority ?? 0}`
        : "—";
      const tr = el("tr", {},
        el("td", { class: "vote", style: "white-space:nowrap" }, r.ruling_date),
        el("td", {},
          el("a", { href: `ruling.html?id=${r.case_id_slug}` }, r.case_id),
          el("div", { style: "color:var(--text-muted);font-size:12px;margin-top:2px" }, ruling_name(r))
        ),
        el("td", {},
          el("span", { class: `outcome-pill outcome-${r.outcome}` }, r.outcome.replace(/_/g, " "))
        ),
        el("td", { class: "vote" }, vote),
        el("td", { style: "font-size:13px;color:var(--text-muted)" }, (r.doctrine_invoked || []).join(", ")),
        el("td", { style: "font-size:13px" }, lang === "he" ? (r.petitioner_name_he || "") : (r.petitioner_name_en || "")),
      );
      tbody.append(tr);
    }
  }

  filtersDiv.addEventListener("change", render);
  filtersDiv.addEventListener("input", render);

  root.append(main);
  root.append(renderFooter());
  render();
})();
</script>
</body>
</html>
