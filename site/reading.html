<body>
<div id="root"></div>
<script src="assets/app.js?v=548e1f71"></script>
<script>
(async function () {
  const { t, el, fetchJSON, renderHeader, renderFooter, lang } = window.CO;
  const root = document.getElementById("root");
  document.documentElement.lang = lang;

  root.append(renderHeader("reading"));

  const main = el("main", { class: "reading-page" });

  // ─── Hero header ─────────────────────────────────────────────────
  const hero = el("header", { class: "reading-hero" });
  hero.append(el("h1", { class: "reading-hero-title" }, t.reading_title));
  hero.append(el("p", { class: "reading-hero-intro" }, t.reading_intro));
  main.append(hero);

  // ─── Featured visual story (comic) ───────────────────────────────
  // Prominent above-the-fold card linking to the comic. Helps non-
  // technical readers find a friendly entry point before the
  // category-filtered grid below.
  const featured = el("a", { class: "featured-card", href: "comic-6821-93.html" });
  const featuredLeft = el("div", { class: "featured-card-art" });
  featuredLeft.append(el("img", {
    src: lang === "he" ? "assets/comics/mizrahi-arc/page-he.png" : "assets/comics/mizrahi-arc/page-en.png",
    alt: lang === "he" ? "סיפור מצויר: פרדוקס מקור הסמכות" : "Illustrated story: the paradox of authority's source",
    class: "featured-card-img",
    style: "object-position:top",
    loading: "lazy",
  }));
  featured.append(featuredLeft);
  const featuredRight = el("div", { class: "featured-card-text" });
  featuredRight.append(el("span", { class: "featured-card-eyebrow" },
    lang === "he" ? "סיפור מצויר · חדש" : "Visual story · new"));
  featuredRight.append(el("h2", { class: "featured-card-title" },
    lang === "he"
      ? "פרדוקס מקור הסמכות"
      : "The Paradox of Authority's Source"));
  featuredRight.append(el("p", { class: "featured-card-body" },
    lang === "he"
      ? "סיפור מצויר ב-12 לוחות: כיצד סכסוך חוב קטן בקיבוץ הפך לכלי שבאמצעותו שאב בית משפט בלתי-נבחר את סמכותו מתוך חוקי-היסוד של הכנסת עצמה — ולאחר מכן השתמש באותה סמכות כדי לחסן את עצמו מפני ניסיון הכנסת היחיד לרסן אותה. גרסה ידידותית, מצוירת, של מאמר היסוד של הפרויקט."
      : "A 12-panel story: how a small kibbutz-debt dispute became the vehicle through which an unelected court drew its authority from the Knesset's own Basic Laws — then used that very authority to immunize itself from the Knesset's one attempt to rein it in. A friendly, illustrated companion to the project's foundational essay."));
  featuredRight.append(el("span", { class: "featured-card-cta" },
    (lang === "he" ? "התחל לקרוא " : "Start reading ") + "→"));
  featured.append(featuredRight);
  main.append(featured);

  let content = {};
  try {
    content = await fetchJSON("_data/content.json");
  } catch (e) {
    main.append(el("p", {}, `Error: ${e.message}`));
    root.append(main);
    return;
  }

  const categoryOrder = ["essays", "explainers", "patterns"];
  const categoryLabel = {
    essays: t.cat_essays,
    explainers: t.cat_explainers,
    patterns: t.cat_patterns,
  };
  const categoryBadge = {
    essays: t.cat_badge_essays,
    explainers: t.cat_badge_explainers,
    patterns: t.cat_badge_patterns,
  };

  // Tiny inline SVG icons (no external deps) that hint at category type
  function categoryIcon(cat) {
    const svgNS = "http://www.w3.org/2000/svg";
    const svg = document.createElementNS(svgNS, "svg");
    svg.setAttribute("viewBox", "0 0 32 32");
    svg.setAttribute("class", "card-icon-svg");
    svg.setAttribute("aria-hidden", "true");
    const paths = {
      essays: "M8 4h13l4 4v20H8z M21 4v4h4",
      explainers: "M16 4c4 0 7 3 7 7 0 3-1.5 5-3 6.5-1 1-1.5 2-1.5 3.5H13.5c0-1.5-.5-2.5-1.5-3.5C10.5 16 9 14 9 11c0-4 3-7 7-7z M13 25h6 M14 28h4",
      patterns: "M5 26V10 M5 26h22 M9 22V14 M14 22V8 M19 22V12 M24 22V16",
    };
    const p = document.createElementNS(svgNS, "path");
    p.setAttribute("d", paths[cat] || paths.essays);
    p.setAttribute("fill", "none");
    p.setAttribute("stroke", "currentColor");
    p.setAttribute("stroke-width", "1.8");
    p.setAttribute("stroke-linejoin", "round");
    p.setAttribute("stroke-linecap", "round");
    svg.append(p);
    return svg;
  }

  // ─── Category filter pills ───────────────────────────────────────
  const filterBar = el("div", { class: "reading-filter" });
  filterBar.append(el("span", { class: "reading-filter-label" }, t.filter_category));
  const allCategoriesBtn = el("button", {
    class: "reading-filter-pill active",
    "data-cat": "all",
  }, t.filter_all_categories);
  filterBar.append(allCategoriesBtn);
  for (const cat of categoryOrder) {
    if (!(content[cat] || []).length) continue;
    const btn = el("button", {
      class: `reading-filter-pill reading-filter-pill--${cat}`,
      "data-cat": cat,
    }, categoryLabel[cat]);
    filterBar.append(btn);
  }
  main.append(filterBar);

  // ─── Card grid (all pieces, with data-cat for filtering) ─────────
  const grid = el("div", { class: "reading-grid" });
  const cards = [];
  for (const cat of categoryOrder) {
    const items = content[cat] || [];
    for (const item of items) {
      const card = el("a", {
        class: `reading-card reading-card--${cat}`,
        href: `content.html?slug=${encodeURIComponent(item.slug)}`,
        "data-cat": cat,
      });

      const badge = el("span", { class: `card-badge card-badge--${cat}` });
      badge.append(categoryIcon(cat));
      badge.append(el("span", {}, categoryBadge[cat]));
      card.append(badge);

      const localizedTitle = lang === "he"
        ? (item.title_he || item.title)
        : (item.title_en || item.title);
      const localizedSummary = lang === "he"
        ? (item.summary_he || item.summary)
        : (item.summary_en || item.summary);
      card.append(el("h3", { class: "card-title", dir: "auto" }, localizedTitle));
      if (localizedSummary) {
        card.append(el("p", { class: "card-summary", dir: "auto" }, localizedSummary));
      }

      const meta = el("div", { class: "card-meta" });
      const localizedMinutes = lang === "he"
        ? (item.reading_minutes_he || item.reading_minutes)
        : (item.reading_minutes_en || item.reading_minutes);
      if (localizedMinutes) {
        meta.append(el("span", { class: "card-meta-time" },
          // Clock SVG icon inline
          (() => {
            const ns = "http://www.w3.org/2000/svg";
            const svg = document.createElementNS(ns, "svg");
            svg.setAttribute("viewBox", "0 0 24 24");
            svg.setAttribute("class", "card-meta-icon");
            svg.setAttribute("aria-hidden", "true");
            const c = document.createElementNS(ns, "circle");
            c.setAttribute("cx", "12"); c.setAttribute("cy", "12"); c.setAttribute("r", "9");
            c.setAttribute("fill", "none"); c.setAttribute("stroke", "currentColor"); c.setAttribute("stroke-width", "1.6");
            const h = document.createElementNS(ns, "path");
            h.setAttribute("d", "M12 7v5l3 2");
            h.setAttribute("fill", "none"); h.setAttribute("stroke", "currentColor");
            h.setAttribute("stroke-width", "1.6"); h.setAttribute("stroke-linecap", "round");
            svg.append(c); svg.append(h); return svg;
          })()
        ));
        meta.append(el("span", {}, t.read_time(localizedMinutes)));
      }
      if (item.date) {
        meta.append(el("span", { class: "card-meta-sep" }, "·"));
        meta.append(el("span", {}, item.date));
      }
      card.append(meta);

      grid.append(card);
      cards.push({ card, cat });
    }
  }
  main.append(grid);

  // Empty-state placeholder
  const empty = el("p", { class: "reading-empty", style: "display:none" }, t.no_match_filter);
  main.append(empty);

  // ─── Filter behavior ─────────────────────────────────────────────
  const pills = filterBar.querySelectorAll(".reading-filter-pill");
  for (const pill of pills) {
    pill.addEventListener("click", () => {
      const cat = pill.dataset.cat;
      for (const p of pills) p.classList.toggle("active", p === pill);
      let visible = 0;
      for (const c of cards) {
        const show = cat === "all" || c.cat === cat;
        c.card.style.display = show ? "" : "none";
        if (show) visible++;
      }
      empty.style.display = visible === 0 ? "" : "none";
    });
  }

  // ─── Scroll-triggered fade-in for cards ──────────────────────────
  if ("IntersectionObserver" in window) {
    const io = new IntersectionObserver((entries) => {
      for (const ent of entries) {
        if (ent.isIntersecting) {
          ent.target.classList.add("in-view");
          io.unobserve(ent.target);
        }
      }
    }, { threshold: 0.1, rootMargin: "0px 0px -40px 0px" });
    for (const c of cards) {
      c.card.classList.add("will-animate");
      io.observe(c.card);
    }
  }

  root.append(main);
  root.append(renderFooter());
})();
</script>
</body>
</html>
