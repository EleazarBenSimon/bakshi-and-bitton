<!DOCTYPE html>
<html lang="he">
<head>
<meta name="google-site-verification" content="xjBO4qp4oVELM3i_R8MDu1IgT9S9u0hNMyDfKPHIWd4">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bakshi&Bitton · Ruling</title>
<link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
<meta name="description" content="פסיקת בית המשפט העליון — תיעוד מובנה מקושר למקור הרשמי.">
<link rel="canonical" href="https://eleazarbensimon.github.io/bakshi-and-bitton/ruling.html">
<meta property="og:type" content="website">
<meta property="og:site_name" content="Bakshi&Bitton · בקשי וביטון">
<meta property="og:title" content="פסיקה">
<meta property="og:description" content="פסיקת בית המשפט העליון — תיעוד מובנה מקושר למקור הרשמי.">
<meta property="og:url" content="https://eleazarbensimon.github.io/bakshi-and-bitton/ruling.html">

<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="פסיקה">
<meta name="twitter:description" content="פסיקת בית המשפט העליון — תיעוד מובנה מקושר למקור הרשמי.">
<meta name="twitter:image" content="https://eleazarbensimon.github.io/bakshi-and-bitton/assets/og-default.png">
<link rel="stylesheet" href="assets/style.css?v=121ae07a">
<link rel="alternate" type="application/rss+xml" title="Bakshi&Bitton — new rulings" href="feed.xml">
</head>
<body>
<div id="root"></div>
<script src="assets/app.js?v=f70e19b3"></script>
<script>
(async function () {
  const { t, el, fetchJSON, ruling_name, role_label, renderHeader, renderFooter, lang,
          outcome_label, doctrines_label, petitioner_type_label, compliance_label, respondent_label } = window.CO;
  const root = document.getElementById("root");
  document.documentElement.lang = lang;
  root.append(renderHeader("rulings"));
  // Prefer a Hebrew variant of single-language fields when present (he mode).
  const heField = (he, base) => (lang === "he" && he) ? he : base;

  const main = el("main", {});

  const id = new URLSearchParams(location.search).get("id");
  if (!id) {
    main.append(el("p", {}, "No ruling ID specified."));
    root.append(main);
    return;
  }

  let rulings;
  try {
    rulings = await fetchJSON("_data/rulings.json");
  } catch (e) {
    main.append(el("p", {}, `Error: ${e.message}`));
    root.append(main);
    return;
  }

  const r = rulings.find((x) => x.case_id_slug === id);
  if (!r) {
    main.append(el("p", {}, `Ruling not found: ${id}`));
    root.append(main);
    return;
  }

  // Localized title + canonical pointing at the prerendered static page (so
  // search engines fold this SPA view into the canonical landing page).
  document.title = `${r.case_id} — ${ruling_name(r)} · בקשי וביטון`;
  const canon = document.querySelector('link[rel="canonical"]');
  if (canon) canon.setAttribute("href", `ruling-${id}.html`);

  main.append(el("p", {}, el("a", { href: "index.html" }, "← " + t.nav_rulings)));
  main.append(window.CO.renderRulingHero(r));

  // Illustrated comic for this ruling, if any (prominent callout)
  if (r.comic) {
    const ctitle = lang === "he" ? (r.comic.title_he || r.comic.title_en) : (r.comic.title_en || r.comic.title_he);
    main.append(el("p", { class: "ruling-comic-link" },
      el("a", { href: r.comic.url }, "🖼 " + ctitle + " →")));
  }

  if (r.print_citation) {
    main.append(el("p", { class: "print-citation" },
      t.label_print_citation + ": ", el("strong", {}, r.print_citation)));
  }
  if (r.official_url) {
    // court.gov.il = the authoritative ruling; anything else is a secondary
    // description and must not be labeled as the official ruling text.
    const isCourt = r.official_url.includes("court.gov.il");
    main.append(el("p", {}, el("a", { class: "source-link", href: r.official_url, target: "_blank", rel: "noopener" },
      "→ " + (isCourt ? t.label_official_url : t.label_online_secondary))));
  }

  const grid = el("dl", { class: "ruling-detail-grid" });

  const addField = (label, value) => {
    if (value == null || value === "" || (Array.isArray(value) && value.length === 0)) return;
    grid.append(el("dt", {}, label));
    if (typeof value === "string" || typeof value === "number") {
      grid.append(el("dd", {}, String(value)));
    } else if (value instanceof Node) {
      grid.append(el("dd", {}, value));
    } else {
      grid.append(el("dd", {}, JSON.stringify(value)));
    }
  };

  addField(t.label_ruling_date, r.ruling_date);
  if (r.filing_date) addField(t.label_filing_date, r.filing_date);
  addField(t.label_petitioner_type, petitioner_type_label(r.petitioner_type));
  addField(t.label_petitioner, lang === "he" ? r.petitioner_name_he : r.petitioner_name_en);
  addField(t.label_respondent, lang === "he" ? respondent_label(r.respondent) : r.respondent);
  if (r.respondent_body) addField(t.label_respondent_body, heField(r.respondent_body_he, r.respondent_body));
  addField(t.label_respondent_decision, lang === "he" ? r.respondent_decision_he : r.respondent_decision_en);
  addField(t.label_doctrine_invoked, doctrines_label(r.doctrine_invoked));
  addField(t.label_outcome, el("span", { class: `outcome-pill outcome-${r.outcome}` }, outcome_label(r.outcome)));
  if (r.vote_majority != null) {
    addField(t.label_vote, `${r.vote_majority}–${r.vote_minority ?? 0}`);
  }
  const predAg = heField(r.predicate_ag_opinion_he, r.predicate_ag_opinion);
  if (predAg) addField(t.label_predicate_ag, predAg);
  if (r.compliance_state) addField(t.label_compliance, compliance_label(r.compliance_state));
  const defiance = heField(r.defiance_signals_he, r.defiance_signals);
  if (defiance) addField(t.label_defiance, defiance);
  if ((r.tags || []).length) addField(t.label_tags, (r.tags || []).join(", "));

  main.append(grid);

  // Panel
  main.append(el("h2", {}, t.label_panel));
  const ul = el("ul", { class: "panel-list" });
  for (const j of r.panel || []) {
    const isMajAuthor = (r.majority_authors || []).includes(j.slug);
    const isMinAuthor = (r.minority_authors || []).includes(j.slug);
    const klass = isMajAuthor ? "author-majority" : isMinAuthor ? "author-minority" : "";
    const jname = lang === "he" ? j.name_he : j.name_en;
    const linkable = j.slug && !j.slug.startsWith("unverified");
    const li = el("li", { class: klass },
      linkable ? el("a", { href: `justice.html?slug=${j.slug}` }, jname) : jname,
      j.role ? el("span", { style: "color:var(--text-muted);font-size:11px;margin-inline-start:6px" }, role_label(j.role)) : null,
    );
    ul.append(li);
  }
  main.append(ul);

  if (r.majority_authors?.length || r.minority_authors?.length) {
    main.append(el("p", { style: "font-size:13px;color:var(--text-muted);margin-top:8px" },
      `· ${t.label_majority_authors}: ${(r.majority_authors || []).join(", ") || "—"}`,
      el("br"),
      `· ${t.label_minority_authors}: ${(r.minority_authors || []).join(", ") || "—"}`,
    ));
  }

  // Secondary sources
  if ((r.secondary_urls || []).length) {
    main.append(el("h2", {}, t.label_secondary_sources));
    const ul2 = el("ul", {});
    for (const u of r.secondary_urls) {
      ul2.append(el("li", {}, el("a", { href: u, target: "_blank", rel: "noopener" }, u)));
    }
    main.append(ul2);
  }

  // Notes
  const notesTxt = heField(r.notes_he, r.notes);
  if (notesTxt) {
    main.append(el("h2", {}, t.label_notes));
    main.append(el("div", { class: "notes-box" }, notesTxt));
  }

  // Related reading — content pieces that discuss this ruling
  if ((r.related_content || []).length) {
    main.append(el("h2", {}, t.label_related_reading));
    const ul = el("ul", { class: "related-reading" });
    const catBadge = { essays: t.cat_badge_essays, explainers: t.cat_badge_explainers, patterns: t.cat_badge_patterns };
    for (const p of r.related_content) {
      const ptitle = lang === "he" ? (p.title_he || p.title_en) : (p.title_en || p.title_he);
      ul.append(el("li", {},
        el("a", { href: `content.html?slug=${encodeURIComponent(p.slug)}` }, ptitle),
        el("span", { style: "color:var(--text-muted);font-size:12px;margin-inline-start:6px" },
          "· " + (catBadge[p.category] || p.category))));
    }
    main.append(ul);
  }

  root.append(main);
  root.append(renderFooter());
  window.CO.decorateMQG(root);
})();
</script>
</body>
</html>
