<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bakshi&Bitton · Comic · HCJ 5658/23</title>
<link rel="stylesheet" href="assets/style.css">
<link rel="alternate" type="application/rss+xml" title="Bakshi&Bitton — new rulings" href="feed.xml">
</head>
<body>
<div id="root"></div>
<script src="assets/app.js"></script>
<script>
(function () {
  const { t, el, renderHeader, renderFooter, lang } = window.CO;
  const root = document.getElementById("root");
  document.documentElement.lang = lang;

  root.append(renderHeader("reading"));

  const main = el("main", { class: "comic-page" });

  // Header for the comic
  const header = el("header", { class: "comic-header" });
  header.append(el("p", { class: "comic-breadcrumb" },
    el("a", { href: "reading.html" }, t.reading_title), " / ",
    lang === "he" ? "קומיקס" : "Comic"));
  header.append(el("h1", { class: "comic-title" },
    lang === "he"
      ? "מי נתן להם את הסמכות הזו?"
      : "Who gave them that authority?"));
  header.append(el("p", { class: "comic-subtitle" },
    lang === "he"
      ? "סיפור קצר בחמישה לוחות: כיצד הגיע בית המשפט העליון בישראל לפסול תיקון לחוק-יסוד, וכיצד הסמכות לעשות זאת מעולם לא הוענקה לו על-ידי הציבור או הכנסת."
      : "A short five-panel story: how the Israeli Supreme Court came to strike an amendment to a Basic Law, and how the authority to do so was never granted to it by the public or the Knesset."));
  main.append(header);

  // ─── Panel data (bilingual) ─────────────────────────────────────
  const panels = [
    {
      img: "assets/comics/5658-23/panel-1-1992-knesset.png",
      year_he: "1992",
      year_en: "1992",
      caption_he: "הכנסת מחוקקת את חוק-יסוד: כבוד האדם וחירותו. חוק-יסוד הוא חוק שכמוהו אין: הוא נחשב לקרוב ביותר לחוקה שיש לישראל.",
      caption_en: "The Knesset enacts Basic Law: Human Dignity and Liberty. A Basic Law is the closest thing Israel has to a constitution.",
      bubbles: [],
    },
    {
      img: "assets/comics/5658-23/panel-2-1995-mizrahi.png",
      year_he: "1995 · בנק המזרחי",
      year_en: "1995 · Bank Mizrahi",
      caption_he: "בית המשפט העליון מצהיר לראשונה על סמכותו לבטל חקיקה רגילה של הכנסת — סמכות שאף חוק לא הקנה לו במפורש.",
      caption_en: "The Supreme Court declares, for the first time, its authority to strike down ordinary Knesset legislation — an authority no statute ever explicitly granted it.",
      bubbles: [
        {
          x: 0.45, y: 0.20, w: 0.42, h: 0.18,
          text_he: "מהיום, אנחנו נקבע אילו מהחוקים שלכם תקפים.",
          text_en: "From today, WE will decide which of your laws are valid.",
          tail: "bottom-left",
        },
      ],
    },
    {
      img: "assets/comics/5658-23/panel-3-2021-shafir.png",
      year_he: "2021 · שפיר",
      year_en: "2021 · Shafir",
      caption_he: "בית המשפט מרחיב את סמכותו: גם תיקונים לחוקי-יסוד עצמם יכולים להיפסל, אם בית המשפט יקבע כי הם 'שימוש לרעה בסמכות מכוננת'. שלב זה מכונה 'התראת בטלות'.",
      caption_en: "The Court extends its reach: even amendments to Basic Laws themselves can be struck down — if the Court decides they are an 'abuse of constituent power.' This stage is called a 'warning of voidness.'",
      bubbles: [
        {
          x: 0.05, y: 0.06, w: 0.50, h: 0.16,
          text_he: "ואנחנו עשויים לבטל גם חוקי-יסוד שלכם — אם נמצא לנכון.",
          text_en: "And we may annul your Basic Laws too — if we so decide.",
          tail: "bottom-right",
        },
      ],
    },
    {
      img: "assets/comics/5658-23/panel-4-2024-strike.png",
      year_he: "ינואר 2024 · בג״ץ 5658/23",
      year_en: "January 2024 · HCJ 5658/23",
      caption_he: "לראשונה בתולדותיו, בית המשפט העליון מבטל בפועל תיקון לחוק-יסוד. בית המשפט נסמך בהחלטתו על פסיקתו-שלו מ-1995 ועל פסיקתו-שלו מ-2021. אף לא אחת מהן מעוגנת בחוק שחוקקה הכנסת.",
      caption_en: "For the first time in its history, the Supreme Court actually annuls an amendment to a Basic Law. The Court grounds its decision in its own 1995 ruling and its own 2021 ruling. Neither is anchored in any statute the Knesset enacted.",
      bubbles: [],
      stamp_he: "בטל",
      stamp_en: "ANNULLED",
    },
    {
      img: "assets/comics/5658-23/panel-5-the-question.png",
      year_he: "",
      year_en: "",
      caption_he: "וזה — בדיוק זה — השאלה שהפרויקט הזה מתעד.",
      caption_en: "And that — precisely that — is the question this project documents.",
      bubbles: [
        {
          x: 0.06, y: 0.05, w: 0.46, h: 0.18,
          text_he: "אבל מאסטרו... מי בכלל נתן להם את הסמכות הזו?",
          text_en: "But Maestro... who actually gave them that authority?",
          tail: "bottom-right",
        },
      ],
    },
  ];

  // ─── Render each panel ──────────────────────────────────────────
  const strip = el("div", { class: "comic-strip" });
  panels.forEach((p, i) => {
    const panel = el("figure", { class: "comic-panel" });

    // Panel number badge (top-start corner)
    panel.append(el("div", { class: "comic-panel-number" }, String(i + 1)));

    // Image container (relative for absolute overlays)
    const imgWrap = el("div", { class: "comic-panel-image-wrap" });
    imgWrap.append(el("img", {
      src: p.img,
      alt: lang === "he" ? p.caption_he : p.caption_en,
      class: "comic-panel-image",
      loading: "lazy",
    }));

    // Speech bubble overlays
    for (const b of (p.bubbles || [])) {
      const bubble = el("div", {
        class: `comic-bubble comic-bubble--${b.tail || "bottom-left"}`,
        style: `left:${b.x*100}%;top:${b.y*100}%;width:${b.w*100}%;`,
        dir: "auto",
      }, lang === "he" ? b.text_he : b.text_en);
      imgWrap.append(bubble);
    }

    // "ANNULLED" stamp overlay (panel 4)
    if (p.stamp_he && p.stamp_en) {
      const stamp = el("div", { class: "comic-stamp" },
        lang === "he" ? p.stamp_he : p.stamp_en);
      imgWrap.append(stamp);
    }

    // Year ribbon (above image)
    const yearText = lang === "he" ? p.year_he : p.year_en;
    if (yearText) {
      panel.append(el("div", { class: "comic-year-ribbon", dir: "auto" }, yearText));
    }
    panel.append(imgWrap);

    // Caption (below image)
    const caption = el("figcaption", { class: "comic-caption", dir: "auto" },
      lang === "he" ? p.caption_he : p.caption_en);
    panel.append(caption);

    strip.append(panel);
  });
  main.append(strip);

  // ─── Endnote ────────────────────────────────────────────────────
  const endnote = el("section", { class: "comic-endnote" });
  endnote.append(el("h2", {}, lang === "he"
    ? "האם זה באמת ככה?"
    : "Is that really how it happened?"));
  endnote.append(el("p", { class: "comic-endnote-body" }, lang === "he"
    ? "כן — באופן מהותי, כן. כל אחד מהאירועים בסיפור הזה הוא פסק-דין שמתועד באתר זה. הקומיקס מבליט את המבנה הרקורסיבי של ההרחבה — בית המשפט מצטט את עצמו, את פסיקותיו הקודמות, כסמכות לפסיקותיו הבאות. הציבור או הכנסת לא חיוו בכך דעה — מעולם."
    : "Yes — substantively, yes. Each event in this story is a ruling documented on this site. The comic highlights the recursive structure of the expansion: the Court cites itself — its own prior rulings — as the authority for its next ruling. The public and the Knesset never weighed in. Not once."));
  const links = el("p", { class: "comic-endnote-links" });
  links.append(el("a", { href: "content.html?slug=from-bank-mizrahi-to-hcj-5658-23" },
    lang === "he" ? "המסה המלאה: ממזרחי לבג״ץ 5658/23" : "Read the full essay: From Bank Mizrahi to HCJ 5658/23"));
  links.append(el("br", {}));
  links.append(el("a", { href: "ruling.html?id=6821-93-bank-mizrahi" },
    lang === "he" ? "פסק הדין: בנק המזרחי (1995)" : "Ruling: Bank Mizrahi (1995)"));
  links.append(el("br", {}));
  links.append(el("a", { href: "ruling.html?id=5969-20-shafir" },
    lang === "he" ? "פסק הדין: שפיר (2021)" : "Ruling: Shafir (2021)"));
  links.append(el("br", {}));
  links.append(el("a", { href: "ruling.html?id=5658-23" },
    lang === "he" ? "פסק הדין: בג״ץ 5658/23 (2024)" : "Ruling: HCJ 5658/23 (2024)"));
  endnote.append(links);
  main.append(endnote);

  root.append(main);
  root.append(renderFooter());

  // Scroll-triggered fade-in for panels
  if ("IntersectionObserver" in window) {
    const panelsEls = main.querySelectorAll(".comic-panel");
    const io = new IntersectionObserver((entries) => {
      for (const ent of entries) {
        if (ent.isIntersecting) {
          ent.target.classList.add("in-view");
          io.unobserve(ent.target);
        }
      }
    }, { threshold: 0.15 });
    for (const p of panelsEls) {
      p.classList.add("will-animate");
      io.observe(p);
    }
  }
})();
</script>
</body>
</html>
