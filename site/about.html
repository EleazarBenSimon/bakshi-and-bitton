      <h1>אודות הפרויקט</h1>

      <p><strong>בקשי וביטון</strong> הוא פרויקט דוקומנטרי לשימור והפצה של התהליך המתמשך שבו בית המשפט העליון בישראל מעוות מתפקידו כשומר החוק לכלי שמגביל את המוסדות הנבחרים של מדינת ישראל בניגוד לרצון הציבור שבחר בהם.</p>

      <h2>מה הפרויקט עושה</h2>
      <p>בשתי שכבות:</p>
      <ul>
        <li><strong>שכבת הליבה התיעודית</strong>: רישומים מובְנים של כל פסיקות בית המשפט העליון בעניין החלטות ממשלה ומינויים. כל רישום: מספר תיק, הרכב, עילה, הצבעה, תוצאה — וקישור ישיר לפסק-הדין הרשמי. עובדות הליכיות מתועדות בלבד.</li>
        <li><strong>שכבת התוכן המידעי</strong>: מאמרי הקשר, תיעוד דפוסים והסברים מקצרים שמחברים פסיקות בודדות לתמונה הגדולה. תוכן זה נסקר על-ידי מתאמים; כל טענה חוזרת אל השכבה התיעודית או אל מקור סמכותי אחר.</li>
      </ul>
      <p>שתי השכבות יחד משרתות <strong>מודעות ציבורית</strong>: מאפשרות לאזרחים לראות, להבין ולפעול בתגובה לעיוות המתמשך של האיזון החוקתי בישראל.</p>

      <h2>מה הפרויקט לא — בכל מקרה</h2>
      <p>המאגר אינו פלטפורמה — ולא יורשה — לאף אחד מן הבאים, וכל ניסיון שימוש כזה יוסר על-ידי המתאמים:</p>
      <ul>
        <li><strong>השפלה</strong> של כל אדם — שופטים, עורכי-דין, נושאי תפקיד, צדדים, או תורמים</li>
        <li><strong>הסתה</strong> לפעולה כנגד כל אדם או קבוצה</li>
        <li><strong>שפה לא נאותה</strong> — בוטות, גידופים, מסגרות מנמיכות</li>
        <li><strong>מעשי נקמה</strong> או יישוב חשבונות אישיים</li>
        <li><strong>הפצת שקרים</strong> — כל טענה חייבת להיות מקושרת למקור</li>
        <li><strong>קריאות לאלימות</strong> בכל צורה, נגד כל יעד</li>
        <li><strong>כל מטרה מחוץ</strong> למאמץ הכן והמשמעת לתקן את העיוותים במערכת המשפט הישראלית לטובת כלל האזרחים</li>
      </ul>
      <p>הגבלות אלו הן הגבול המגדיר של הפרויקט. למתאמים סמכות מלאה להסיר תכנים ותורמים שמפרים אותן.</p>

      <h2>הערכים שהפרויקט נשען עליהם</h2>
      <ul>
        <li><strong>אמת</strong> — כל עובדה ניתנת לאימות; כל מסגרת מקורית</li>
        <li><strong>צדק</strong> — שיקום האיזון החוקתי הראוי, שבו מוסדות נבחרים שולטים בגבולות החוק, והחוק עצמו נקבע בהסכמת הנשלטים</li>
        <li><strong>מוסר</strong> — אופי הפרויקט חייב לשקף את העקרונות שהוא מבקש לשקם</li>
        <li><strong>חיפוש צדק לכלל האזרחים</strong> — לא האינטרסים הצרים של מחנה פוליטי כלשהו, אלא יציבות ושלום בני-קיימא שבהם מדינת ישראל יכולה לשרת את כלל אזרחיה</li>
      </ul>

      <h2>מתודולוגיה</h2>
      <p>פסיקה נכללת בליבה התיעודית אם ורק אם: (1) היא פסיקת בית המשפט העליון; (2) היא פסק-דין סופי; (3) העותר תקף החלטה ממשלתית או מינוי; (4) פסק-הדין מתפרסם באתר הרשמי; (5) הפסיקה היא מ-24 החודשים האחרונים.</p>
      <p>תוכן מידעי בשכבת ההסברים חייב להיות מקושר למקור עבור כל טענה, נסקר על-ידי מתאמים, ולעמוד במשמעת השפה והאיפיון המתוארת ב-<a href="https://github.com/EleazarBenSimon/bakshi-and-bitton/blob/main/METHODOLOGY.md">METHODOLOGY.md</a>.</p>

      <h2>תרומה לפרויקט</h2>
      <p>תרומות תיעודיות (פסיקות חדשות) ותרומות תוכן מידעי (מאמרים, מסמכי דפוסים) מתקבלות מתורמים שיכולים לקבל את המתודולוגיה ואת מסגרת ניהול ההסברים. ראו <a href="https://github.com/EleazarBenSimon/bakshi-and-bitton/blob/main/CONTRIBUTING.md">CONTRIBUTING.md</a> ו-<a href="https://github.com/EleazarBenSimon/bakshi-and-bitton/blob/main/MODERATION.md">MODERATION.md</a>.</p>

      <h2>הקשר היסטורי</h2>
      <p>פסיקות הבית-משפט המסוקרות במאגר זה פועלות בתוך המסגרת החוקתית שניסח השופט אהרן ברק ב<strong>ע"א 6821/93 בנק המזרחי המאוחד נ' מגדל כפר שיתופי (1995)</strong>. הביקורת על אותה מסגרת — והוויכוח הציבורי הסוער סביבה — אינם נושא של מאגר זה. אנחנו מפרסמים את הנתונים; הוויכוח מתנהל במקומות אחרים.</p>

      <h2>פניות תיקון ופניות נושא-מידע</h2>
      <p>אם זיהיתם טעות עובדתית באחת מהרשומות במאגר, או ברצונכם להגיש בקשת תיקון מידע אישי תחת חוק הגנת הפרטיות (תיקון 13), אנא שלחו אימייל לכתובת המופיעה ב-<a href="https://github.com/EleazarBenSimon/bakshi-and-bitton/blob/main/SECURITY.md">SECURITY.md</a>. נשיב לפניות בתוך 7 ימי עבודה.</p>
    `;

    main.innerHTML = `
      <h1>About the Project</h1>

      <p><strong>Bakshi&Bitton</strong> is a documentary preservation project of the ongoing process by which the Israeli Supreme Court has been transformed from a guardian of law into an instrument that constrains the elected institutions of the State of Israel against the will of the public.</p>

      <h2>What the project does</h2>
      <p>In two layers:</p>
      <ul>
        <li><strong>Documentary core</strong>: structured records of every Israeli Supreme Court ruling that intervenes in a government decision or appointment. Each entry: case ID, panel, doctrine, vote, outcome — linked directly to the official judgment. Documented procedural facts only.</li>
        <li><strong>Informative content layer</strong>: context essays, pattern documents, and explainers that connect individual rulings into the larger picture they form. Moderator-reviewed; every claim traces back either to the documentary core or to other authoritative sources.</li>
      </ul>
      <p>Together these layers serve <strong>public awareness</strong>: enabling citizens to see, understand, and respond to the ongoing distortion of constitutional balance in Israel.</p>

      <h2>What this project is NOT — under any circumstance</h2>
      <p>This is not a platform for any of the following, and all such uses will be removed by moderators:</p>
      <ul>
        <li><strong>Humiliation</strong> of any person — judges, attorneys, public officials, parties, or fellow contributors</li>
        <li><strong>Incitement</strong> to action against any person or group</li>
        <li><strong>Inappropriate language</strong> — vulgarity, slurs, dehumanizing framings</li>
        <li><strong>Acts of revenge</strong> or settling personal scores</li>
        <li><strong>Spreading of lies</strong> — every claim must be source-linked and verifiable</li>
        <li><strong>Calls for violence</strong> in any form, against any target</li>
        <li><strong>Any purpose outside</strong> the honest, disciplined effort to document distortions in the Israeli legal system and correct them through democratic means for the benefit of all citizens</li>
      </ul>
      <p>These restrictions are the project's defining boundary. The moderators have full authority to remove content and contributors who violate them.</p>

      <h2>The foundational values</h2>
      <ul>
        <li><strong>Truth</strong> — every documented fact is verifiable; every framing is sourced</li>
        <li><strong>Justice</strong> — restoration of proper constitutional balance, where elected institutions govern within the law and the law is determined by the consent of the governed</li>
        <li><strong>Morality</strong> — the conduct of the project must reflect the principles it seeks to restore</li>
        <li><strong>Pursuit of justice for all citizens</strong> — not the narrow interests of any political camp, but sustainable peace and stability in which the State of Israel can serve all of its people</li>
      </ul>

      <h2>Methodology</h2>
      <p>A ruling is in scope for the documentary core if and only if: (1) it is an Israeli Supreme Court ruling; (2) it is a final judgment; (3) the petitioner challenged a government decision or appointment; (4) the ruling is published on the official Court site; (5) the ruling is from the last 24 months.</p>
      <p>Informative content in the editorial layer must have every claim source-linked, be reviewed by moderators, and comply with the language and characterization discipline documented in <a href="https://github.com/EleazarBenSimon/bakshi-and-bitton/blob/main/METHODOLOGY.md">METHODOLOGY.md</a>.</p>

      <h2>Contributing</h2>
      <p>Both documentary additions (new rulings) and informative content additions (essays, pattern documents) are welcome from contributors who can accept the methodology and the moderation framework. See <a href="https://github.com/EleazarBenSimon/bakshi-and-bitton/blob/main/CONTRIBUTING.md">CONTRIBUTING.md</a> and <a href="https://github.com/EleazarBenSimon/bakshi-and-bitton/blob/main/MODERATION.md">MODERATION.md</a>.</p>

      <h2>Historical context</h2>
      <p>The rulings tracked here operate under the constitutional-review framework articulated by Justice Aharon Barak in <strong>CA 6821/93 United Mizrahi Bank v. Migdal Cooperative Village (1995)</strong>. Critique of that framework — and the broader public debate around it — is not the subject of this dataset. We publish the data; the debate happens elsewhere.</p>

      <h2>Corrections and data-subject requests</h2>
      <p>If you have identified a factual error in any entry, or you wish to file a personal-data correction request under Israeli Privacy Protection Law (Amendment 13), please send an email to the contact listed in <a href="https://github.com/EleazarBenSimon/bakshi-and-bitton/blob/main/SECURITY.md">SECURITY.md</a>. We aim to respond to such requests within 7 business days.</p>
    `;
  }

  root.append(main);
  root.append(renderFooter());
