<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Court Observatory · About</title>
<link rel="stylesheet" href="assets/style.css">
</head>
<body>
<div id="root"></div>
<script src="assets/app.js"></script>
<script>
(async function () {
  const { t, el, renderHeader, renderFooter, lang } = window.CO;
  const root = document.getElementById("root");
  document.documentElement.lang = lang;
  root.append(renderHeader("about"));

  const main = el("main", {});

  if (lang === "he") {
    main.innerHTML = `
      <h1>אודות הפרויקט</h1>

      <p><strong>מצפה המשפט</strong> הוא מאגר ציבורי של פסיקות בית המשפט העליון בעניין החלטות ממשלה ומינויים, מובְנה לפי סכמת JSON, וקשור לפסקי-הדין המקוריים באתר הרשמי של בית המשפט.</p>

      <h2>מה הפרויקט הזה כן</h2>
      <ul>
        <li>מאגר נתונים מובְנים: מספר תיק, תאריך, הרכב, עותר, החלטה הממשלתית שעורערה, עילה משפטית, תוצאה, ופירוט הצבעה</li>
        <li>קישור לפסק-הדין הרשמי לכל פסיקה</li>
        <li>זמין בעברית ובאנגלית</li>
        <li>קוד פתוח (רישיון MIT) — כל אחד יכול להעתיק, לבדוק, להוסיף או לתקן</li>
      </ul>

      <h2>מה הפרויקט הזה לא</h2>
      <ul>
        <li><strong>איננו תומכים בעמדה.</strong> אנחנו מפרסמים נתונים. איננו מפרשים, מאפיינים או נוקטים עמדה</li>
        <li><strong>איננו מאפיינים שופטים.</strong> הצבעות וחיבור חוות-דעת הם עובדות. אין שדה "אידיאולוגיה" או "הטיה"</li>
        <li><strong>איננו מחליפים מקורות רשמיים.</strong> כל קביעה מקושרת לטקסט פסק-הדין המקורי</li>
      </ul>

      <h2>מתודולוגיה</h2>
      <p>פסיקה נכללת במאגר אם ורק אם:</p>
      <ol>
        <li>היא פסיקת בית המשפט העליון (בג"ץ או ערעור)</li>
        <li>היא פסק-דין סופי (לא צו ביניים)</li>
        <li>העותר תקף החלטה ממשלתית או מינוי</li>
        <li>פסק-הדין מתפרסם באתר הרשמי</li>
        <li>הפסיקה היא מ-24 החודשים האחרונים (אלא אם מסומנת ככניסה היסטורית)</li>
      </ol>
      <p>פרטים מלאים: <a href="https://github.com/EleazarBenSimon/court-observatory/blob/main/METHODOLOGY.md">METHODOLOGY.md</a></p>

      <h2>תרומה לפרויקט</h2>
      <p>כל אחד יכול להוסיף פסיקה. ראו <a href="https://github.com/EleazarBenSimon/court-observatory/blob/main/CONTRIBUTING.md">CONTRIBUTING.md</a>.</p>

      <h2>הקשר היסטורי</h2>
      <p>פסיקות הבית-משפט המסוקרות במאגר זה פועלות בתוך המסגרת החוקתית שניסח השופט אהרן ברק ב<strong>ע"א 6821/93 בנק המזרחי המאוחד נ' מגדל כפר שיתופי (1995)</strong>. הביקורת על אותה מסגרת — והוויכוח הציבורי הסוער סביבה — אינם נושא של מאגר זה. אנחנו מפרסמים את הנתונים; הוויכוח מתנהל במקומות אחרים.</p>

      <h2>פניות תיקון ופניות נושא-מידע</h2>
      <p>אם זיהיתם טעות עובדתית באחת מהרשומות במאגר, אנא פתחו <a href="https://github.com/EleazarBenSimon/court-observatory/issues">Issue ב-GitHub</a> עם קישור למקור סותר. בקשות לתיקון מידע אישי תחת חוק הגנת הפרטיות (תיקון 13) ניתן לשלוח גם דרך הקישור הנ"ל או דרך כתובת המייל המופיעה ב-<a href="https://github.com/EleazarBenSimon/court-observatory/blob/main/SECURITY.md">SECURITY.md</a>. נשיב לפניות מסוג זה בתוך 7 ימי עבודה.</p>
    `;
  } else {
    main.innerHTML = `
      <h1>About the Project</h1>

      <p><strong>Court Observatory</strong> is a public dataset of Israeli Supreme Court rulings on government decisions and appointments, structured under a JSON schema, with every entry linked back to the official ruling text on the Court's own portal.</p>

      <h2>What this project is</h2>
      <ul>
        <li>A structured dataset: case number, date, panel composition, petitioner, government decision being challenged, legal doctrine invoked, outcome, and vote split</li>
        <li>An official-source link for every ruling</li>
        <li>Bilingual: Hebrew and English</li>
        <li>Open source (MIT) — anyone can fork, audit, contribute, or correct</li>
      </ul>

      <h2>What this project is NOT</h2>
      <ul>
        <li><strong>It is not advocacy.</strong> We publish data. We do not interpret, characterize, or take positions</li>
        <li><strong>It does not characterize justices.</strong> Vote records and authorship are facts. There is no "ideology" or "bias" field</li>
        <li><strong>It does not replace official sources.</strong> Every claim links to the official ruling text</li>
      </ul>

      <h2>Methodology</h2>
      <p>A ruling is in scope if and only if:</p>
      <ol>
        <li>It is an Israeli Supreme Court ruling</li>
        <li>It is a final judgment (not an interim order)</li>
        <li>The petitioner challenged a government decision or appointment</li>
        <li>The ruling is published on the official Court site</li>
        <li>The ruling is from the last 24 months (unless marked as a historical-context entry)</li>
      </ol>
      <p>Full details: <a href="https://github.com/EleazarBenSimon/court-observatory/blob/main/METHODOLOGY.md">METHODOLOGY.md</a></p>

      <h2>Contributing</h2>
      <p>Anyone can submit a ruling. See <a href="https://github.com/EleazarBenSimon/court-observatory/blob/main/CONTRIBUTING.md">CONTRIBUTING.md</a>.</p>

      <h2>Historical context</h2>
      <p>The rulings tracked here operate under the constitutional-review framework articulated by Justice Aharon Barak in <strong>CA 6821/93 United Mizrahi Bank v. Migdal Cooperative Village (1995)</strong>. Critique of that framework — and the broader public debate around it — is not the subject of this dataset. We publish the data; the debate happens elsewhere.</p>

      <h2>Corrections and data-subject requests</h2>
      <p>If you have identified a factual error in any entry, please open a <a href="https://github.com/EleazarBenSimon/court-observatory/issues">GitHub Issue</a> with a link to a contradicting source. Requests for personal-data correction under Israeli Privacy Protection Law (Amendment 13) may be sent via the same channel or via the contact email listed in <a href="https://github.com/EleazarBenSimon/court-observatory/blob/main/SECURITY.md">SECURITY.md</a>. We aim to respond to such requests within 7 business days.</p>
    `;
  }

  root.append(main);
  root.append(renderFooter());
})();
</script>
</body>
</html>
