<div id="root"></div>
<script src="assets/app.js?v=548e1f71"></script>
<script>
(async function () {
  const { t, el, fetchJSON, renderHeader, renderFooter, renderTimeline, lang } = window.CO;
  const root = document.getElementById("root");
  document.documentElement.lang = lang;
  root.append(renderHeader("timeline"));

  let rulings = [], events = [];
  try { rulings = await fetchJSON("_data/rulings.json"); } catch (e) {}
  try { events = await fetchJSON("_data/curve_events.json"); } catch (e) {}

  if (!rulings.length && !events.length) {
    root.append(el("main", {}, el("p", {}, "Error loading timeline data.")));
  } else {
    root.append(renderTimeline(rulings, events));
  }
  root.append(renderFooter());
})();
</script>
